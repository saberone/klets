name: Build & Publish klets-audio

on:
  push:
    tags:
      - 'audio-v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            package: audio-darwin-arm64
            binary: klets-audio
          - target: x86_64-apple-darwin
            os: macos-13
            package: audio-darwin-x64
            binary: klets-audio
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            package: audio-linux-x64-gnu
            binary: klets-audio
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            package: audio-linux-arm64-gnu
            binary: klets-audio
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            package: audio-win32-x64
            binary: klets-audio.exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            package: audio-win32-arm64
            binary: klets-audio.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux cross-compilation tools
        if: matrix.cross
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libasound2-dev:arm64

      - name: Install Linux ALSA dev (native)
        if: runner.os == 'Linux' && !matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Build
        working-directory: crates/klets-audio
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PKG_CONFIG_ALLOW_CROSS: ${{ matrix.cross && '1' || '' }}
          PKG_CONFIG_PATH: ${{ matrix.cross && '/usr/lib/aarch64-linux-gnu/pkgconfig' || '' }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary to package
        shell: bash
        run: |
          cp crates/klets-audio/target/${{ matrix.target }}/release/${{ matrix.binary }} \
             packages/${{ matrix.package }}/bin/${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: packages/${{ matrix.package }}/

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages/

      - name: Publish platform packages
        run: |
          for pkg in packages/audio-*/; do
            echo "Publishing $(basename $pkg)..."
            cd "$pkg"
            npm publish --provenance --access public
            cd -
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
